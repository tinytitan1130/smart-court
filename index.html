<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCourt 籃球戰術模擬器</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column; 
            align-items: center;
            /* 【修復排版】拿掉 overflow: hidden，改為最小高度與上下留白，允許滾動 */
            min-height: 100vh;
            padding: 30px 0;
            background-color: #2c3e50; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }

        #controlPanel {
            margin-bottom: 10px;
            /* 戰術面板依靠內部 absolute 定位，這裡不特別設 display */
        }

        #drawPanel {
            margin-bottom: 10px;
            display: flex;
            gap: 10px; 
            align-items: center;
            justify-content: center;
        }

        .tactics-btn {
            padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer;
            border: 2px solid #ecf0f1; border-radius: 5px; background-color: transparent;
            color: #ecf0f1; transition: all 0.3s ease;
        }
        .tactics-btn:hover { background-color: rgba(255, 255, 255, 0.1); }
        .tactics-btn.active { background-color: #3498db; border-color: #3498db; color: white; }

        .color-btn { padding: 8px 15px; font-size: 14px; border-width: 2px; }
        .color-btn.active { box-shadow: 0 0 10px rgba(255,255,255,0.8); }

        #courtSettings { margin-bottom: 15px; color: #ecf0f1; text-align: center; }
        #courtLogoSelect { padding: 5px 10px; font-size: 16px; border-radius: 5px; cursor: pointer; }

        canvas { background-color: #c9c5c1; box-shadow: 0 10px 30px rgba(0,0,0,1); border-radius: 8px; cursor: default; }

        /* 模態框 (Modal) */
        .modal-overlay {
            position: fixed; /* 改為 fixed 確保蓋滿全螢幕 */
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999; color: white;
            overflow-y: auto; /* 避免卡片太多超出畫面 */
        }
        .modal-title { font-size: 2.5em; color: #f39c12; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .modal-subtitle { font-size: 1.2em; color: #bdc3c7; margin-bottom: 30px; }
        .menu-btn-group { display: flex; gap: 20px; }
        .menu-btn {
            padding: 15px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 8px; border: none;
            background-color: #3498db; color: white; transition: transform 0.2s, background-color 0.2s;
        }
        .menu-btn:hover { background-color: #2980b9; transform: scale(1.05); }
        .menu-btn.cancel { background-color: #e74c3c; margin-top: 30px; }
        .menu-btn.cancel:hover { background-color: #c0392b; }
        
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px; width: 80%; max-width: 800px; margin-bottom: 30px;
        }
        .select-card {
            background: rgba(255, 255, 255, 0.1); border: 3px solid transparent; border-radius: 12px;
            padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s ease;
        }
        .select-card:hover { background: rgba(255, 255, 255, 0.2); border-color: #f39c12; transform: translateY(-5px); }
        .select-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; margin-bottom: 15px; background-color: rgba(0,0,0,0.2); }
        .select-card h3 { margin: 0; font-size: 16px; }
    </style>
</head>
<body>

    <div id="startupMenu" class="modal-overlay">
        <h1 class="modal-title">🏀 SmartCourt 戰術板</h1>
        <p class="modal-subtitle">請選擇模擬模式</p>
        <div class="menu-btn-group">
            <button id="modeTeamBtn" class="menu-btn">球隊模式</button>
            <button id="modeAllStarBtn" class="menu-btn">全明星模式</button>
            <button id="modeNormalBtn" class="menu-btn" style="background-color: #95a5a6;">普通模式</button>
        </div>
    </div>

    <div id="teamSelectModal" class="modal-overlay" style="display: none;">
        <h1 id="teamSelectTitle" class="modal-title">請選擇【進攻】球隊</h1>
        <p class="modal-subtitle">點擊下方球隊圖示</p>
        <div id="teamGrid" class="grid-container"></div>
        <button class="menu-btn cancel" onclick="location.reload()">返回主選單</button>
    </div>

    <div id="draftModal" class="modal-overlay" style="display: none;">
        <h1 id="draftTitle" class="modal-title">選秀介面</h1>
        <p id="draftSubtitle" class="modal-subtitle">請選擇球員</p>
        <div id="draftGrid" class="grid-container"></div>
        <button class="menu-btn cancel" onclick="location.reload()">返回主選單</button>
    </div>

    <div id="courtSettings" style="display: none;">
        <label style="font-weight: bold;">🏟️ 球場地板 Logo：</label>
        <select id="courtLogoSelect">
            <option value="">(預設木地板無 Logo)</option>
        </select>
    </div>

    <div id="controlPanel" style="display: none;"></div>
    
    <div id="drawPanel" style="display: none;">
        <button id="toggleDrawBtn" class="tactics-btn">🖍️ 畫筆模式: 關</button>
        <button class="tactics-btn color-btn active" data-color="#f1c40f" style="color:#f1c40f; border-color:#f1c40f;">■ 黃 (標記)</button>
        <button class="tactics-btn color-btn" data-color="#3498db" style="color:#3498db; border-color:#3498db;">■ 藍 (進攻)</button>
        <button class="tactics-btn color-btn" data-color="#e74c3c" style="color:#e74c3c; border-color:#e74c3c;">■ 紅 (防守)</button>
        <button id="clearDrawBtn" class="tactics-btn" style="background-color:#e67e22; border-color:#e67e22; color:white;">🗑️ 清除畫布</button>
    </div>

    <canvas id="courtCanvas" width="800" height="600" style="display: none;"></canvas>

    <script src="js/config.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
